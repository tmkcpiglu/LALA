name: Phoenix V100 5-Machine Cluster

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # Triggers every 6 hours

jobs:
  strike:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        machine: [1, 2, 3, 4, 5] # 5 machines running in parallel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Strike Engine
        run: |
          pip install playwright
          playwright install chromium
      - name: Ignite Phoenix Cluster
        env:
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
        run: python -u main.py
